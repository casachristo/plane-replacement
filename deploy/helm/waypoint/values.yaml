## Waypoint Helm chart values
## Override per-env in values-<env>.yaml.

namespace: media

api:
  image:
    repository: 10.43.36.84:3000/chris/waypoint-api
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  replicas: 1
  publicPort: 8080
  internalPort: 8081
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  env:
    ASPNETCORE_ENVIRONMENT: Production
  # OIDC values come from the waypoint-oidc Secret; only non-secret bits live here.
  oidc:
    authority: https://auth.chris.box
    clientId: waypoint
    redirectUri: https://waypoint.chris.box/auth/callback
    scopes: ["openid", "profile", "email", "groups"]
    adminGroups: ["admins", "waypoint-admins"]

web:
  image:
    repository: 10.43.36.84:3000/chris/waypoint-web
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  replicas: 1
  port: 3000
  # In-cluster service URL — used by Next.js server components to fetch the API
  # without hairpinning out through Traefik. Browser requests for /api/v1/* hit
  # Traefik directly (the IngressRoute routes them to waypoint-public), so this
  # value only affects server-side fetches inside the SPA pod.
  apiBase: http://waypoint-public
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

postgres:
  image: postgres:16-alpine
  storage: 50Gi
  storageClass: ""    # use cluster default
  database: waypoint
  username: waypoint
  # Password sourced from waypoint-config Secret

ingress:
  host: waypoint.chris.box
  tlsSecretName: media-tls

backup:
  enabled: true
  schedule: "0 3 * * *"
  retentionDays: 30
  s3:
    bucket: homelab-backups
    endpoint: https://minio.chris.box
    region: homelab
    # accessKey / secretKey sourced from waypoint-config Secret
