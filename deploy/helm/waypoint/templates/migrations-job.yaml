apiVersion: batch/v1
kind: Job
metadata:
  name: waypoint-migrate-{{ .Release.Revision }}
  namespace: {{ .Values.namespace }}
  annotations:
    "helm.sh/hook": pre-upgrade,pre-install
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          command: ["dotnet", "Waypoint.Api.dll", "migrate"]
          env:
            - name: ConnectionStrings__Postgres
              valueFrom:
                secretKeyRef: { name: waypoint-config, key: postgres-connection-string }
