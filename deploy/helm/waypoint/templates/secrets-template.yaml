## NOT applied by Helm — this is a documentation manifest showing the Secret shape that
## Helm expects to find. Create these out-of-band before `helm install`:
##
## kubectl -n media create secret generic waypoint-config \
##   --from-literal=postgres-connection-string='Host=waypoint-postgres;Database=waypoint;Username=waypoint;Password=<pw>' \
##   --from-literal=postgres-password='<pw>' \
##   --from-literal=s3-token='<minio-token>'
##
## kubectl -n media create secret generic waypoint-oidc \
##   --from-literal=client_secret='<from-authelia-config>'
##
## kubectl -n media create secret generic waypoint-tls \
##   --from-file=tls.crt=/path/to/cert --from-file=tls.key=/path/to/key
##
## Or sourced from external-secrets / sealed-secrets if you use them.
