name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: waypoint
          POSTGRES_USER: waypoint
          POSTGRES_PASSWORD: waypoint
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U waypoint"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore
      - run: dotnet build --no-restore --configuration Release
      - name: Run tests
        env:
          WAYPOINT_TEST_PG_HOST: localhost
          WAYPOINT_TEST_PG_PORT: "5432"
          WAYPOINT_TEST_PG_USER: waypoint
          WAYPOINT_TEST_PG_PASSWORD: waypoint
        run: dotnet test --no-build --configuration Release --logger "console;verbosity=normal"

  mutation-domain:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet tool restore
      - name: Stryker on Waypoint.Domain
        working-directory: src/Waypoint.Domain
        run: dotnet stryker --break-at 85

  mutation-api-auth:
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:16-alpine
        env: { POSTGRES_DB: waypoint, POSTGRES_USER: waypoint, POSTGRES_PASSWORD: waypoint }
        ports: ["5432:5432"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet tool restore
      - name: Stryker on Waypoint.Api (auth + endpoints)
        working-directory: src/Waypoint.Api
        env:
          WAYPOINT_TEST_PG_HOST: localhost
        # CI gate: ANY surviving mutation in Auth/ is a build failure (zero-tolerance).
        # Stryker doesn't have a per-folder zero-tolerance flag yet — Phase 7 follow-up
        # ticket: add post-Stryker analysis step that greps the json report for
        # surviving mutants under Auth/ and fails the job.
        run: dotnet stryker --break-at 80
